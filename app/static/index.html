<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HangoutAgent 出行企划助手</title>
  <meta name="description" content="HangoutAgent Travel Multi-Agent Console">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8f5;
      --panel: #ffffff;
      --panel-soft: #f9fbf8;
      --line: #dce5dd;
      --line-strong: #c3d3c5;
      --ink: #17211d;
      --muted: #64746b;
      --green: #147d64;
      --green-strong: #0d654f;
      --green-soft: #e6f4ef;
      --blue: #2e5e9e;
      --blue-soft: #eaf2ff;
      --amber: #a96712;
      --amber-soft: #fff4dc;
      --red: #b42318;
      --red-soft: #fff1ee;
      --shadow: 0 18px 46px rgba(28, 44, 35, 0.1);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(246, 248, 245, 0.96)),
        repeating-linear-gradient(90deg, rgba(20, 125, 100, 0.045) 0 1px, transparent 1px 92px);
    }

    button, textarea, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled, textarea:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      overflow: hidden;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 22px 18px 18px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: var(--green);
      box-shadow: 0 12px 24px rgba(20, 125, 100, 0.22);
    }

    .brand h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .sidebar-body {
      padding: 14px;
      display: grid;
      gap: 14px;
      overflow: auto;
    }

    .thread-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 24px rgba(28, 44, 35, 0.05);
      padding: 12px 14px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .mode-btn {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }

    .mode-btn.active {
      color: #fff;
      background: var(--green);
    }

    .primary-btn, .ghost-btn, .danger-btn {
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      font-weight: 650;
      transition: background 140ms ease, border 140ms ease, transform 140ms ease;
    }

    .primary-btn {
      color: #fff;
      background: var(--green);
    }

    .primary-btn:hover {
      background: var(--green-strong);
    }

    .ghost-btn {
      color: var(--green-strong);
      border-color: var(--line-strong);
      background: #fff;
    }

    .danger-btn {
      color: var(--red);
      border-color: #f0c7c1;
      background: var(--red-soft);
    }

    .thread-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .thread-id {
      margin-top: 8px;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      color: var(--blue);
      background: var(--blue-soft);
      border-radius: 8px;
      padding: 8px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .session-list-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .session-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease;
    }

    .session-item:hover {
      border-color: var(--line-strong);
      background: var(--panel-soft);
    }

    .session-item.active {
      border-color: var(--green);
      background: var(--green-soft);
    }

    .session-item .session-name {
      flex: 1;
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .session-item .session-time {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .session-item .session-delete {
      width: 20px;
      height: 20px;
      border: none;
      background: none;
      color: var(--muted);
      font-size: 14px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 140ms;
    }

    .session-item:hover .session-delete {
      opacity: 1;
    }

    .session-item .session-delete:hover {
      color: var(--red);
      background: var(--red-soft);
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .topbar {
      min-height: 76px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(14px);
    }

    .topbar h2 {
      margin: 0;
      font-size: 20px;
    }

    .topbar p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      color: var(--green-strong);
      background: var(--green-soft);
      border: 1px solid rgba(20, 125, 100, 0.2);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .messages {
      min-height: 0;
      overflow: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty {
      max-width: 780px;
      margin: auto;
      text-align: center;
      color: var(--muted);
    }

    .empty-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: var(--green);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .empty h3 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 24px;
    }

    .empty p {
      margin: 0;
      line-height: 1.7;
    }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--green);
      box-shadow: 0 10px 24px rgba(20, 125, 100, 0.16);
    }

    .msg-row.user .avatar {
      background: var(--blue);
      order: 2;
    }

    .bubble {
      max-width: min(860px, 78%);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 8px 22px rgba(28, 44, 35, 0.06);
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .msg-row.user .bubble {
      color: #fff;
      background: var(--blue);
      border-color: rgba(46, 94, 158, 0.18);
      white-space: pre-wrap;
    }

    .status-msg .bubble {
      color: var(--amber);
      background: var(--amber-soft);
      border-color: #efd49d;
      font-weight: 700;
    }

    .error-msg .bubble {
      color: var(--red);
      background: var(--red-soft);
      border-color: #f0c7c1;
    }

    .plan-panel,
    .interrupt {
      margin: 0 24px 16px;
      padding: 14px;
      border: 1px solid #efd49d;
      border-radius: 8px;
      background: var(--amber-soft);
      box-shadow: var(--shadow);
    }

    .plan-panel {
      border-color: var(--line-strong);
      background: var(--panel);
    }

    .plan-panel.hidden,
    .interrupt.hidden {
      display: none;
    }

    .plan-panel h3,
    .interrupt h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .plan-panel p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .plan-options,
    .email-fields {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .email-fields {
      margin-top: 12px;
      align-items: center;
    }

    .email-fields input {
      min-height: 38px;
      min-width: 210px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      padding: 8px 10px;
      background: #fff;
    }

    .email-fields.hidden {
      display: none;
    }

    .plan-options.hidden {
      display: none;
    }

    .email-preview {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.6;
    }
    .email-field {
      margin-bottom: 4px;
    }
    .email-label {
      font-weight: 600;
      color: var(--muted);
    }
    .email-body-label {
      font-weight: 600;
      color: var(--muted);
      margin: 8px 0 4px;
    }
    .email-body {
      white-space: pre-wrap;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 13px;
    }

    .interrupt textarea {
      width: 100%;
      min-height: 64px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      padding: 10px;
      background: #fff;
    }

    .interrupt-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .composer {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(14px);
    }

    .composer form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 170px;
      resize: vertical;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    textarea:focus {
      border-color: rgba(20, 125, 100, 0.48);
      box-shadow: 0 0 0 3px rgba(20, 125, 100, 0.12);
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .topbar {
        padding: 14px 16px;
      }

      .messages {
        padding: 16px;
      }

      .bubble {
        max-width: 88%;
      }

      .composer {
        padding: 12px 16px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 16c3-7 8-10 16-11-1 8-4 13-11 16l-1-5-4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 15l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>HangoutAgent</h1>
          <p>智能出行规划</p>
        </div>
      </div>

      <div class="sidebar-body">
        <button id="newThreadBtn" class="primary-btn" type="button">新建出行会话</button>

        <div id="sessionListContainer" class="session-list">
          <div class="session-list-label">会话列表</div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2>出行企划助手</h2>
          <p>输入你的出行想法，我会整理成可执行的城市行程。</p>
        </div>
        <div id="statusPill" class="status-pill">就绪</div>
      </header>

      <section id="messages" class="messages">
        <div id="emptyState" class="empty">
          <div class="empty-icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M4 16c3-7 8-10 16-11-1 8-4 13-11 16l-1-5-4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              <path d="M9 15l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <h3>开始规划你的出行</h3>
          <p>告诉我目的地、出发地、时间或偏好，我会帮你整理行程。</p>
        </div>
      </section>

      <section id="planPanel" class="plan-panel hidden">
        <h3 id="planPanelTitle">选择方案</h3>
        <p id="planPanelText">选定一个方案后，我会整理最终版。</p>
        <div id="planOptions" class="plan-options">
          <button class="ghost-btn plan-choice" type="button" data-plan="方案一">方案一</button>
          <button class="ghost-btn plan-choice" type="button" data-plan="方案二">方案二</button>
          <button class="ghost-btn plan-choice" type="button" data-plan="方案三">方案三</button>
        </div>
        <div id="emailFields" class="email-fields hidden">
          <input id="friendNameInput" type="text" placeholder="朋友名字">
          <input id="friendEmailInput" type="email" placeholder="朋友邮箱">
          <button id="inviteFriendBtn" class="primary-btn" type="button">生成邀请邮件</button>
        </div>
      </section>

      <section id="interruptPanel" class="interrupt hidden">
        <h3 id="interruptTitle">需要确认</h3>
        <div id="emailPreview" class="email-preview" style="display:none;">
          <div class="email-field"><span class="email-label">收件人：</span><span id="emailTo"></span></div>
          <div class="email-field"><span class="email-label">主题：</span><span id="emailSubject"></span></div>
          <div class="email-body-label">邮件内容：</div>
          <div id="emailBody" class="email-body"></div>
        </div>
        <p id="interruptText"></p>
        <textarea id="rejectReason" placeholder="如果拒绝，可以写下需要调整的原因。"></textarea>
        <div class="interrupt-actions">
          <button id="approveBtn" class="primary-btn" type="button">确认</button>
          <button id="rejectBtn" class="danger-btn" type="button">拒绝</button>
        </div>
      </section>

      <footer class="composer">
        <form id="chatForm">
          <textarea id="messageInput" placeholder="输入你的出行需求" autocomplete="off"></textarea>
          <button id="sendBtn" class="primary-btn" type="submit">发送</button>
        </form>
      </footer>
    </main>
  </div>

  <script>
    const els = {
      messages: document.getElementById("messages"),
      emptyState: document.getElementById("emptyState"),
      messageInput: document.getElementById("messageInput"),
      chatForm: document.getElementById("chatForm"),
      sendBtn: document.getElementById("sendBtn"),
      newThreadBtn: document.getElementById("newThreadBtn"),
      statusPill: document.getElementById("statusPill"),
      sessionListContainer: document.getElementById("sessionListContainer"),
      interruptPanel: document.getElementById("interruptPanel"),
      interruptTitle: document.getElementById("interruptTitle"),
      interruptText: document.getElementById("interruptText"),
      rejectReason: document.getElementById("rejectReason"),
      approveBtn: document.getElementById("approveBtn"),
      rejectBtn: document.getElementById("rejectBtn"),
      planPanel: document.getElementById("planPanel"),
      planPanelTitle: document.getElementById("planPanelTitle"),
      planPanelText: document.getElementById("planPanelText"),
      planOptions: document.getElementById("planOptions"),
      emailFields: document.getElementById("emailFields"),
      friendNameInput: document.getElementById("friendNameInput"),
      friendEmailInput: document.getElementById("friendEmailInput"),
      inviteFriendBtn: document.getElementById("inviteFriendBtn"),
    };

    // ---- 会话管理 ----
    // 本页面只维护出行会话；邮件发送是出行方案后的 HITL 动作。
    function loadSessions() {
      try {
        return JSON.parse(localStorage.getItem("hangout_sessions") || "[]");
      } catch { return []; }
    }

    function saveSessions(sessions) {
      localStorage.setItem("hangout_sessions", JSON.stringify(sessions));
    }

    function ensureCurrentSession() {
      let sessions = loadSessions();
      let activeId = localStorage.getItem("hangout_active");
      // 如果没有任何会话或 activeId 不在列表里，创建一个
      if (!sessions.length) {
        const newSession = {
          id: crypto.randomUUID(),
          name: `会话 1`,
          createdAt: Date.now(),
        };
        sessions.unshift(newSession);
        saveSessions(sessions);
        activeId = newSession.id;
        localStorage.setItem("hangout_active", activeId);
      } else if (!sessions.find(s => s.id === activeId)) {
        activeId = sessions[0].id;
        localStorage.setItem("hangout_active", activeId);
      }
      return activeId;
    }

    const state = {
      busy: false,
      pendingInterrupt: null,
      selectedPlan: null,
    };

    ensureCurrentSession();

    function currentThreadId() {
      return localStorage.getItem("hangout_active");
    }

    function modeConfig() {
      return {
        title: "出行企划助手",
        subtitle: "输入你的出行想法，我会整理成可执行的城市行程。",
        placeholder: "输入你的出行需求",
        emptyTitle: "开始规划你的出行",
        emptyText: "告诉我目的地、出发地、时间或偏好，我会帮你整理行程。",
        newThreadText: "新建出行会话",
        busyText: "调研中",
      };
    }

    function renderEmptyState() {
      const config = modeConfig();
      els.messages.innerHTML = `<div id="emptyState" class="empty"><div class="empty-icon" aria-hidden="true"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M4 16c3-7 8-10 16-11-1 8-4 13-11 16l-1-5-4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 15l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div><h3>${config.emptyTitle}</h3><p>${config.emptyText}</p></div>`;
      els.emptyState = document.getElementById("emptyState");
    }

    function historyEndpoint() {
      return "/api/v1/hangout/messages";
    }

    async function loadActiveSessionMessages() {
      renderEmptyState();
      hideInterrupt();
      hidePlanPanel();
      try {
        const response = await fetch(`${historyEndpoint()}?thread_id=${encodeURIComponent(currentThreadId())}`);
        if (!response.ok) return;
        const data = await response.json();
        const messages = data.messages || [];
        if (!messages.length) return;
        els.messages.innerHTML = "";
        els.emptyState = null;
        for (const msg of messages) {
          if (msg.role === "user" || msg.role === "assistant") {
            addMessage(msg.role, msg.content || "");
          }
        }
        if (data.has_interrupt && data.interrupt) {
          showInterrupt(data.interrupt);
        }
      } catch (error) {
        addMessage("assistant", "读取历史会话失败。", "error-msg");
      }
    }

    function renderSessionList() {
      const sessions = loadSessions();
      const activeId = currentThreadId();
      // 清空列表（保留 label）
      els.sessionListContainer.innerHTML = '<div class="session-list-label">会话列表</div>';
      if (!sessions.length) return;
      sessions.forEach((s) => {
        const item = document.createElement("div");
        item.className = `session-item${s.id === activeId ? " active" : ""}`;
        item.innerHTML = `
          <span class="session-name">${s.name}</span>
          <span class="session-time">${new Date(s.createdAt).toLocaleDateString()}</span>
          <button class="session-delete" title="删除会话">×</button>
        `;
        // 点击切换会话
        item.addEventListener("click", (e) => {
          if (e.target.classList.contains("session-delete")) return;
          if (state.busy || s.id === activeId) return;
          localStorage.setItem("hangout_active", s.id);
          renderSessionList();
          els.statusPill.textContent = "就绪";
          loadActiveSessionMessages();
        });
        // 删除按钮
        item.querySelector(".session-delete").addEventListener("click", async (e) => {
          e.stopPropagation();
          if (state.busy) return;
          state.busy = true;
          const deletingActive = s.id === activeId;
          try {
            await fetch(`${historyEndpoint()}?thread_id=${encodeURIComponent(s.id)}`, { method: "DELETE" });
            let updatedSessions = loadSessions().filter(x => x.id !== s.id);
            saveSessions(updatedSessions);
            if (deletingActive) {
              const nextId = ensureCurrentSession();
              localStorage.setItem("hangout_active", nextId);
            }
            renderSessionList();
            await loadActiveSessionMessages();
          } finally {
            state.busy = false;
          }
        });
        els.sessionListContainer.appendChild(item);
      });
    }

    function applyMode() {
      const config = modeConfig();
      document.querySelector(".topbar h2").textContent = config.title;
      document.querySelector(".topbar p").textContent = config.subtitle;
      els.messageInput.placeholder = config.placeholder;
      els.newThreadBtn.textContent = config.newThreadText;
      els.statusPill.textContent = "就绪";
      renderSessionList();
      loadActiveSessionMessages();
    }

    applyMode();

    function setBusy(value) {
      state.busy = value;
      els.sendBtn.disabled = value;
      els.messageInput.disabled = value;
      els.statusPill.textContent = value ? modeConfig().busyText : "就绪";
    }

    function clearEmpty() {
      if (els.emptyState) {
        els.emptyState.remove();
        els.emptyState = null;
      }
    }

    function scrollToBottom() {
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function hasSelectablePlans(content) {
      // 交通方式选择在聊天里完成，不弹面板
      return false;
    }

    function showPlanPanel() {
      state.selectedPlan = null;
      els.planPanelTitle.textContent = "选择方案";
      els.planPanelText.textContent = "选定一个方案后，我会整理最终版。";
      els.planOptions.classList.remove("hidden");
      els.emailFields.classList.add("hidden");
      els.friendNameInput.value = "";
      els.friendEmailInput.value = "";
      els.planPanel.classList.remove("hidden");
      els.planPanel.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function hidePlanPanel() {
      els.planPanel.classList.add("hidden");
      els.planOptions.classList.remove("hidden");
      els.emailFields.classList.add("hidden");
      state.selectedPlan = null;
    }

    function showCompanionPanel() {
      els.planPanelTitle.textContent = "发送给同伴";
      els.planPanelText.textContent = "如果要邀请同伴，填写名字和邮箱，我会先生成邮件并让你确认。";
      els.planOptions.classList.add("hidden");
      els.emailFields.classList.remove("hidden");
      els.friendNameInput.value = "";
      els.friendEmailInput.value = "";
      els.planPanel.classList.remove("hidden");
      els.planPanel.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function addMessage(role, content, kind = "") {
      clearEmpty();
      const row = document.createElement("div");
      row.className = `msg-row ${role} ${kind}`.trim();

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerHTML = role === "user"
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 16c3-7 8-10 16-11-1 8-4 13-11 16l-1-5-4 0Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 15l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;

      row.append(avatar, bubble);
      els.messages.appendChild(row);
      scrollToBottom();
      return bubble;
    }

    function appendToBubble(bubble, content) {
      bubble.textContent += content;
      scrollToBottom();
    }

    async function typeIntoBubble(bubble, content) {
      for (const char of content) {
        appendToBubble(bubble, char);
        await new Promise((resolve) => setTimeout(resolve, 8));
      }
    }

    function showInterrupt(payload) {
      state.pendingInterrupt = payload;
      console.log("interrupt payload:", JSON.stringify(payload, null, 2));

      const emailPreview = document.getElementById("emailPreview");
      const emailTo = document.getElementById("emailTo");
      const emailSubject = document.getElementById("emailSubject");
      const emailBody = document.getElementById("emailBody");

      let info = payload.type === "email_confirm" ? payload : (payload.interrupt || payload);
      if (Array.isArray(info)) {
        info = info[0] || {};
      }
      const actionRequest = Array.isArray(info.action_requests) ? info.action_requests[0] : null;
      const args = actionRequest?.args || {};

      if (info.type === "weather_confirm") {
        els.interruptTitle.textContent = "天气确认";
        emailPreview.style.display = "none";
        els.interruptText.textContent = `${info.message || "天气不太理想，是否继续？"}${info.weather_summary ? "\n\n" + info.weather_summary : ""}`;
        els.approveBtn.textContent = "不介意，继续";
        els.rejectBtn.textContent = "在意，换时间";
      } else if (info.to || info.to_email || args.to_email || args.to) {
        els.interruptTitle.textContent = "邮件发送确认";
        emailTo.textContent = `${info.to_name || args.to_name || ""} (${info.to_email || info.to || args.to_email || args.to || ""})`;
        emailSubject.textContent = info.subject || args.subject || "";
        emailBody.textContent = info.body || args.body || args.message || "";
        emailPreview.style.display = "block";
        els.interruptText.textContent = "请确认以上邮件内容，确认后将发送。";
        els.approveBtn.textContent = "确认发送";
        els.rejectBtn.textContent = "拒绝并修改";
      } else {
        els.interruptTitle.textContent = "操作确认";
        emailPreview.style.display = "none";
        els.interruptText.textContent = "这个操作需要你确认后继续。";
        els.approveBtn.textContent = "确认";
        els.rejectBtn.textContent = "拒绝";
      }

      els.interruptPanel.classList.remove("hidden");
      els.interruptPanel.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function hideInterrupt() {
      state.pendingInterrupt = null;
      els.rejectReason.value = "";
      els.interruptPanel.classList.add("hidden");
      document.getElementById("emailPreview").style.display = "none";
    }

    function parseSseBlock(block) {
      let event = "message";
      const dataLines = [];
      for (const line of block.split(/\r?\n/)) {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        if (line.startsWith("data:")) dataLines.push(line.slice(5).trimStart());
      }
      return { event, data: dataLines.join("\n") };
    }

    async function sendToAgent({ message = "", interruptDecision = null, showPlanChoices = true } = {}) {
      setBusy(true);
      try {
        const endpoint = "/api/v1/hangout/send";
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            thread_id: currentThreadId(),
            interrupt_decision: interruptDecision,
          }),
        });

        if (!response.ok) {
          throw new Error(`请求失败：${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let streamingBubble = null;
        let assistantContent = "";
        els.statusPill.textContent = modeConfig().busyText;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const parts = buffer.split(/\r?\n\r?\n/);
          buffer = parts.pop() || "";

          for (const part of parts) {
            if (!part.trim()) continue;
            const { event, data } = parseSseBlock(part);
            let payload = {};
            try {
              payload = data ? JSON.parse(data) : {};
            } catch {
              payload = { content: data };
            }

            if (event === "message" || event === "message_delta") {
              const delta = typeof payload.content === "string" ? payload.content : "";
              if (delta && delta.trim()) {
                if (!streamingBubble) {
                  streamingBubble = addMessage("assistant", "");
                }
                assistantContent += delta;
                appendToBubble(streamingBubble, delta);
              }
            } else if (event === "message_end") {
              streamingBubble = null;
            } else if (event === "status") {
              streamingBubble = null;
              const statusText = payload.content || "";
              if (statusText) {
                addMessage("assistant", statusText, "status-msg");
                els.statusPill.textContent = statusText;
              }
            } else if (event === "interrupt") {
              streamingBubble = null;
              const interruptPayload = payload.interrupt || payload;
              let interruptInfo = interruptPayload.interrupt || interruptPayload;
              if (Array.isArray(interruptInfo)) {
                interruptInfo = interruptInfo[0] || {};
              }
              const actionRequest = Array.isArray(interruptInfo.action_requests) ? interruptInfo.action_requests[0] : null;
              const args = actionRequest?.args || {};
              const isEmailInterrupt = interruptInfo.to || interruptInfo.to_email || args.to_email || args.to;
              addMessage(
                "assistant",
                interruptInfo.type === "weather_confirm"
                  ? "需要你确认是否介意当前天气。"
                  : (isEmailInterrupt ? "邮件发送前需要你确认。" : "这个操作需要你确认。"),
                "status-msg"
              );
              showInterrupt(interruptPayload);
            } else if (event === "error") {
              streamingBubble = null;
              addMessage("assistant", payload.content || payload.error || "请求出错", "error-msg");
            } else if (event === "done") {
              streamingBubble = null;
            }
          }
        }
      } catch (error) {
        addMessage("assistant", error.message || String(error), "error-msg");
      } finally {
        setBusy(false);
      }
    }

    els.chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = els.messageInput.value.trim();
      if (!message || state.busy) return;
      els.messageInput.value = "";
      addMessage("user", message);

      // 用第一条消息更新会话名
      const sessions = loadSessions();
      const active = sessions.find(s => s.id === currentThreadId());
      if (active && active.name.startsWith("会话 ")) {
        active.name = message.slice(0, 20) + (message.length > 20 ? "..." : "");
        saveSessions(sessions);
        renderSessionList();
      }

      await sendToAgent({ message });
    });

    els.messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        els.chatForm.requestSubmit();
      }
    });

    els.newThreadBtn.addEventListener("click", () => {
      if (state.busy) return;
      const sessions = loadSessions();
      const newSession = {
        id: crypto.randomUUID(),
        name: `会话 ${sessions.length + 1}`,
        createdAt: Date.now(),
      };
      sessions.unshift(newSession);
      saveSessions(sessions);
      localStorage.setItem("hangout_active", newSession.id);
      renderSessionList();
      renderEmptyState();
      hideInterrupt();
      hidePlanPanel();
      els.statusPill.textContent = "就绪";
    });

    document.querySelectorAll(".plan-choice").forEach((button) => {
      button.addEventListener("click", async () => {
        if (state.busy) return;
        state.selectedPlan = button.dataset.plan;
        els.planPanel.classList.add("hidden");
        addMessage("user", `我选择${state.selectedPlan}。`);
        await sendToAgent({
          message: `我选择${state.selectedPlan}，请把这个方案作为最终方案。整理完成后询问我是否要发邮件给同伴，但不要直接发送邮件。`,
          showPlanChoices: false,
        });
        if (state.selectedPlan) {
          showCompanionPanel();
        }
      });
    });

    els.inviteFriendBtn.addEventListener("click", async () => {
      if (state.busy) return;
      const name = els.friendNameInput.value.trim();
      const email = els.friendEmailInput.value.trim();
      if (!state.selectedPlan) {
        addMessage("assistant", "请先选择一个方案。", "error-msg");
        return;
      }
      if (!name || !email) {
        addMessage("assistant", "请填写朋友名字和邮箱。", "error-msg");
        return;
      }
      addMessage("user", `把${state.selectedPlan}发给${name}（${email}）。`);
      els.planPanel.classList.add("hidden");
      await sendToAgent({
        message: `请基于我选择的${state.selectedPlan}，给朋友${name}（${email}）生成并发送出行邀请邮件。邮件发送前必须让我确认。`,
      });
    });

    els.approveBtn.addEventListener("click", async () => {
      const pending = state.pendingInterrupt || {};
      let info = pending.interrupt || pending;
      if (Array.isArray(info)) {
        info = info[0] || {};
      }
      const decision = { type: "approve" };
      hideInterrupt();
      const approveText = info.type === "weather_confirm" ? "不介意天气，继续规划。" : "确认发送邮件。";
      addMessage("user", approveText);
      await sendToAgent({ interruptDecision: decision });
    });

    els.rejectBtn.addEventListener("click", async () => {
      const pending = state.pendingInterrupt || {};
      let info = pending.interrupt || pending;
      if (Array.isArray(info)) {
        info = info[0] || {};
      }
      const message = els.rejectReason.value.trim()
        || (info.type === "weather_confirm" ? "我在意天气，想换个时间。" : "请重新调整邮件内容。");
      const decision = { type: "reject", message };
      hideInterrupt();
      const rejectText = info.type === "weather_confirm" ? `在意天气：${message}` : `拒绝发送：${message}`;
      addMessage("user", rejectText);
      await sendToAgent({ interruptDecision: decision });
    });
  </script>
</body>
</html>
